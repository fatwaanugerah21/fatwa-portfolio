version: "3.9"

services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_GITHUB_USERNAME: ${NEXT_PUBLIC_GITHUB_USERNAME}
    container_name: fatwa-portfolio
    restart: unless-stopped
    env_file: .env.local
    environment:
      - NODE_ENV=production
    expose:
      - "3000"
    networks:
      - web

  nginx:
    image: nginx:alpine
    container_name: fatwa-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - web

networks:
  web:
    driver: bridge
